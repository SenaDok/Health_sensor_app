name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pydantic-settings pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=term-missing

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        run: |
          cd frontend
          npm install
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build all containers
        run: |
          cp .env.example .env
          docker compose build --no-cache

      - name: Smoke test
        run: |
          docker compose up -d
          sleep 15
          curl -f http://localhost:8000/health || (docker compose logs && exit 1)
          docker compose down
